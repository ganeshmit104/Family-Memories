<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Photo Migration Tool</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #1a1008; font-family: 'Lora', serif; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fdf8f0; border-radius: 24px; padding: 40px; max-width: 560px; width: 100%; box-shadow: 0 32px 80px rgba(0,0,0,0.5); }
  .icon { font-size: 48px; margin-bottom: 12px; }
  h1 { font-size: 26px; color: #2a1f0e; margin-bottom: 6px; font-weight: 700; }
  .subtitle { color: #9a8a70; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
  .btn { width: 100%; padding: 16px; background: #c0663a; color: white; border: none; border-radius: 14px; font-family: 'Lora', serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn:hover:not(:disabled) { background: #a0522e; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.success { background: #3a8a50; }
  .progress-wrap { display: none; margin-top: 24px; }
  .progress-wrap.show { display: block; }
  .progress-bar-bg { background: #f0e8d8; border-radius: 100px; height: 10px; overflow: hidden; margin-bottom: 16px; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #c0663a, #e8a020); border-radius: 100px; width: 0%; transition: width 0.4s ease; }
  .log { background: #1a1008; border-radius: 12px; padding: 16px; max-height: 300px; overflow-y: auto; font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.8; }
  .log-line { display: flex; gap: 10px; }
  .log-line .dot { flex-shrink: 0; }
  .log-line.ok .dot { color: #4caf80; } .log-line.err .dot { color: #e06060; } .log-line.info .dot { color: #e8a020; }
  .log-line .msg { color: #c0a878; } .log-line.ok .msg { color: #a0d8b0; } .log-line.err .msg { color: #e09090; }
  .summary { display: none; margin-top: 20px; background: #f0ffe8; border: 1.5px solid #80c860; border-radius: 12px; padding: 16px; font-size: 14px; color: #2a5a20; line-height: 1.7; }
  .summary.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📦</div>
  <h1>Photo Migration Tool</h1>
  <p class="subtitle">Sign in with your Family Memory Book account to move all base64 photos into Supabase Storage. Safe to run more than once.</p>
  <button class="btn" id="startBtn" onclick="runMigration()">🚀 Start Migration</button>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="log" id="log"></div>
  </div>
  <div class="summary" id="summary"></div>
</div>
<script>
const SUPABASE_URL = 'https://gosbqypythcwpntztfiy.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_MUZYFYD_jEXgMpKLgZGjdg_K21pDeqs'
const BUCKET = 'outing-photos'
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

function log(msg, type) {
  type = type || 'info'
  var el = document.getElementById('log')
  var line = document.createElement('div')
  line.className = 'log-line ' + type
  line.innerHTML = '<span class="dot">' + (type==='ok'?'✓':type==='err'?'✗':'→') + '</span><span class="msg">' + msg + '</span>'
  el.appendChild(line)
  el.scrollTop = el.scrollHeight
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%'
}

function base64ToBlob(dataUrl) {
  var parts = dataUrl.split(',')
  var mime = parts[0].match(/:(.*?);/)[1]
  var binary = atob(parts[1])
  var arr = new Uint8Array(binary.length)
  for (var i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i)
  return { blob: new Blob([arr], { type: mime }), mime: mime }
}

function getExt(mime) {
  return (mime.split('/')[1] || 'jpg').replace('jpeg','jpg')
}

async function runMigration() {
  var btn = document.getElementById('startBtn')
  btn.disabled = true
  btn.textContent = 'Migrating...'
  document.getElementById('progressWrap').classList.add('show')

  log('Checking session...')
  var sessionRes = await db.auth.getSession()
  var session = sessionRes.data && sessionRes.data.session
  if (!session) {
    log('Not logged in. Open the app in another tab, log in, then refresh this page.', 'err')
    btn.disabled = false; btn.textContent = '🚀 Start Migration'; return
  }
  var userId = session.user.id
  log('Signed in as: ' + session.user.email, 'ok')

  // Step 1: fetch just IDs and names — no photos to avoid timeout
  log('Fetching outing list (IDs only)...')
  var listRes = await db.from('outings').select('id, name').eq('user_id', userId)
  if (listRes.error) { log('Failed: ' + listRes.error.message, 'err'); return }
  var outingList = listRes.data || []
  log('Found ' + outingList.length + ' outings')

  // Step 2: fetch photos one by one
  log('Checking each outing for base64 photos...')
  var needsMigration = []
  for (var i = 0; i < outingList.length; i++) {
    var o = outingList[i]
    var res = await db.from('outings').select('photos').eq('id', o.id).single()
    if (res.error) { log('  ' + o.name + ': fetch error', 'err'); continue }
    var photos = (res.data && res.data.photos) || []
    var hasBase64 = photos.some(function(p) {
      return (p.data || p.url || '').startsWith('data:')
    })
    if (hasBase64) { needsMigration.push({ id: o.id, name: o.name, photos: photos }) }
    log('  ' + o.name + ': ' + (hasBase64 ? 'needs migration' : 'already clean ✓'))
  }

  if (needsMigration.length === 0) {
    log('Nothing to migrate — all done!', 'ok')
    setProgress(100)
    btn.textContent = '✓ All Clean'
    btn.classList.add('success')
    var s = document.getElementById('summary')
    s.classList.add('show')
    s.innerHTML = '<strong>✅ All done!</strong> No base64 photos found — your database is already clean.'
    return
  }

  log(needsMigration.length + ' outings need migration, starting uploads...')

  var migratedPhotos = 0, skippedPhotos = 0, errors = 0
  var totalPhotos = needsMigration.reduce(function(s,o){ return s + o.photos.length }, 0)
  var processed = 0

  for (var oi = 0; oi < needsMigration.length; oi++) {
    var outing = needsMigration[oi]
    log('Processing: ' + outing.name + ' (' + outing.photos.length + ' photo' + (outing.photos.length !== 1 ? 's' : '') + ')')
    var updatedPhotos = []

    for (var pi = 0; pi < outing.photos.length; pi++) {
      var photo = outing.photos[pi]
      processed++
      var dataUrl = photo.data || photo.url || ''

      if (!dataUrl.startsWith('data:')) {
        updatedPhotos.push(photo)
        skippedPhotos++
        log('  Photo ' + (pi+1) + ': already in Storage', 'ok')
        setProgress(Math.round((processed / totalPhotos) * 90))
        continue
      }

      try {
        var blobInfo = base64ToBlob(dataUrl)
        var filename = userId + '/' + outing.id + '_' + pi + '_' + Date.now() + '.' + getExt(blobInfo.mime)
        var uploadRes = await db.storage.from(BUCKET).upload(filename, blobInfo.blob, { contentType: blobInfo.mime, upsert: true })
        if (uploadRes.error) {
          log('  Photo ' + (pi+1) + ': upload failed — ' + uploadRes.error.message, 'err')
          updatedPhotos.push(photo); errors++
        } else {
          var pubUrl = db.storage.from(BUCKET).getPublicUrl(filename).data.publicUrl
          updatedPhotos.push({ url: pubUrl })
          log('  Photo ' + (pi+1) + ': migrated ✓', 'ok')
          migratedPhotos++
        }
      } catch(e) {
        log('  Photo ' + (pi+1) + ': error — ' + e.message, 'err')
        updatedPhotos.push(photo); errors++
      }
      setProgress(Math.round((processed / totalPhotos) * 90))
    }

    var updateRes = await db.from('outings').update({ photos: updatedPhotos }).eq('id', outing.id)
    if (updateRes.error) log('  DB update failed for ' + outing.name + ': ' + updateRes.error.message, 'err')
    else log('  Saved ' + outing.name, 'ok')
  }

  setProgress(100)
  log('Migration complete!', 'ok')
  btn.textContent = '✓ Migration Complete'
  btn.classList.add('success')
  var sum = document.getElementById('summary')
  sum.classList.add('show')
  sum.innerHTML = '<strong>✅ Migration done!</strong><br>📸 ' + migratedPhotos + ' photo' + (migratedPhotos!==1?'s':'') + ' moved to Storage<br>⏭️ ' + skippedPhotos + ' already in Storage<br>' + (errors > 0 ? '⚠️ ' + errors + ' error' + (errors!==1?'s':'') + '<br>' : '') + '<br>Your app will now load much faster! 🎉'
}
</script>
</body>
</html>
